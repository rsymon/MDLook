<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MDLook</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Helvetica Neue", Arial, sans-serif;
      background: Canvas;
      color: CanvasText;
    }

    body {
      margin: 0;
      padding: 32px;
      line-height: 1.55;
    }

    main {
      max-width: 680px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 12px;
    }

    code {
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
      font-size: 0.94em;
    }
  </style>
</head>
<body>
  <main>
    <h1>MDLook</h1>
    <p>A lightweight Markdown Quick Look reader forked from PreviewMarkdown.</p>
    <p>Run the app once, then select a Markdown file in Finder and press Space.</p>
  </main>
</body>
</html>
